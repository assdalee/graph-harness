name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Test, Build, and Validate
    runs-on: ubuntu-latest
    env:
      GRAPH_BACKEND: mock
      LLM_BACKEND: fake
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        run: python -m pip install uv

      - name: Install Python dependencies
        run: uv sync --extra dev --frozen

      - name: Run project quality gate
        run: uv run python scripts/check.py

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Validate live Docker Compose override
        run: docker compose -f docker-compose.yml -f docker-compose.live.yml config --quiet
