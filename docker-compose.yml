services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: graph-harness-backend:local
    environment:
      APP_NAME: ${APP_NAME:-GraphHarness}
      APP_ENV: ${APP_ENV:-local}
      API_KEY_NAME: ${API_KEY_NAME:-x-api-key}
      LLM_BACKEND: ${LLM_BACKEND:-fake}
      LLM_FAKE_SCENARIOS_PATH: ${LLM_FAKE_SCENARIOS_PATH:-}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-4o-mini}
      LITELLM_TEMPERATURE: ${LITELLM_TEMPERATURE:-0}
      LITELLM_MAX_TOKENS: ${LITELLM_MAX_TOKENS:-2048}
      LITELLM_TIMEOUT_SECONDS: ${LITELLM_TIMEOUT_SECONDS:-60}
      GRAPH_BACKEND: ${GRAPH_BACKEND:-mock}
      GRAPH_SCOPES: ${GRAPH_SCOPES:-https://graph.microsoft.com/.default}
      GRAPH_DEFAULT_API_VERSION: ${GRAPH_DEFAULT_API_VERSION:-v1.0}
      GRAPH_TIMEOUT_SECONDS: ${GRAPH_TIMEOUT_SECONDS:-30}
      AGENT_MAX_TURNS: ${AGENT_MAX_TURNS:-4}
      AGENT_MAX_TOOL_CALLS: ${AGENT_MAX_TOOL_CALLS:-8}
      AGENT_LLM_RETRIES: ${AGENT_LLM_RETRIES:-2}
      AGENT_EMPTY_RESPONSE_RETRIES: ${AGENT_EMPTY_RESPONSE_RETRIES:-1}
      AGENT_REPEATED_TOOL_CALL_LIMIT: ${AGENT_REPEATED_TOOL_CALL_LIMIT:-2}
      AGENT_RECOVERY_MAX_ATTEMPTS: ${AGENT_RECOVERY_MAX_ATTEMPTS:-1}
      AGENT_ENABLE_CLARIFICATION_POLICY: ${AGENT_ENABLE_CLARIFICATION_POLICY:-true}
      AGENT_ENABLE_CONTEXT_COMPACTION: ${AGENT_ENABLE_CONTEXT_COMPACTION:-true}
      AGENT_CONTEXT_RECENT_MESSAGES: ${AGENT_CONTEXT_RECENT_MESSAGES:-8}
      AGENT_CONTEXT_MAX_TOOL_CHARS: ${AGENT_CONTEXT_MAX_TOOL_CHARS:-1800}
      AGENT_LOG_TRACE_EVENTS: ${AGENT_LOG_TRACE_EVENTS:-true}
      AGENT_PARALLEL_READS: ${AGENT_PARALLEL_READS:-true}
      AGENT_REQUIRE_MUTATION_CONFIRMATION: ${AGENT_REQUIRE_MUTATION_CONFIRMATION:-true}
    ports:
      - "8091:8091"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: graph-harness-frontend:local
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
